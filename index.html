<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento Rural - Estável</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; }
        .painel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #fff; padding: 12px;
            border-radius: 5px; border-left: 5px solid #00ff00; font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="painel">
    <b>SISTEMA DE MONITORAMENTO</b><br>
    <small id="status">Carregando dados...</small>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Iniciar o Mapa
    var map = L.map('map').setView([-15, -55], 4);

    // 2. Camada de Satélite (Google)
    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: 'Google'
    }).addTo(map);

    // 3. CAMADA NASA (Nuvens GOES-16) - Muito estável
    var nuvensNasa = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_Band13/default/{time}/GoogleMapsCompatible_Level8/{z}/{y}/{x}.google', {
        time: '', opacity: 0.5, zIndex: 500
    }).addTo(map);

    // 4. CAMADA REDEMET (Radar do Brasil - Aeronáutica)
    var radarBrasil = L.tileLayer.wms("https://redemet.decea.mil.br/geoserver/wms", {
        layers: 'conveccao:radar_max',
        format: 'image/png',
        transparent: true,
        opacity: 0.7,
        zIndex: 1000
    }).addTo(map);

    // 5. CARREGAR FAZENDAS (Com correção para o erro de 'nome')
    fetch('fazendas.json')
        .then(response => response.json())
        .then(data => {
            var camadaFazendas = L.geoJSON(data, {
                style: { color: "#39ff14", weight: 2, fillOpacity: 0.2 },
                onEachFeature: function (feature, layer) {
                    // CORREÇÃO AQUI: Verifica se existe a propriedade antes de ler
                    var nomeFazenda = "Área Registrada";
                    if (feature.properties && feature.properties.nome) {
                        nomeFazenda = feature.properties.nome;
                    } else if (feature.properties && feature.properties.Name) { // Tenta 'Name' com N maiúsculo
                        nomeFazenda = feature.properties.Name;
                    }
                    layer.bindPopup("<b>" + nomeFazenda + "</b>");
                }
            }).addTo(map);
            
            map.fitBounds(camadaFazendas.getBounds());
            document.getElementById('status').innerText = "Fazendas e Satélite: OK";
        })
        .catch(err => {
            document.getElementById('status').innerText = "Erro ao carregar o arquivo .json";
            console.error(err);
        });

    // Controle de Camadas
    var overlays = {
        "Nuvens (NASA)": nuvensNasa,
        "Radar Chuva (REDEMET)": radarBrasil
    };
    L.control.layers({}, overlays, {collapsed: false}).addTo(map);

</script>
</body>
</html>
