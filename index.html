<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radar Rural - Sistema de Elite</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #010101; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .painel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 15px;
            border-radius: 5px; border: 1px solid #00ff00; font-family: monospace;
        }
    </style>
</head>
<body>

<div class="painel">
    > STATUS: CONEXÃO SEGURA NASA/REDEMET<br>
    > MODO: ANTI-BLOQUEIO ATIVADO<br>
    <small id="status">Sincronizando satélites...</small>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Iniciando o Mapa no Brasil
    var map = L.map('map').setView([-15, -55], 4);

    // 2. Fundo Satélite (Google) - Esse raramente bloqueia
    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: 'Google Sat'
    }).addTo(map);

    // 3. CAMADA NASA GOES-16 (O olho que tudo vê)
    // Esse servidor da NASA (GIBS) é o mais confiável do mundo.
    var nuvensNasa = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_Band13/default/{time}/GoogleMapsCompatible_Level8/{z}/{y}/{x}.google', {
        time: '', 
        opacity: 0.5, 
        zIndex: 500,
        attribution: 'NASA GIBS'
    }).addTo(map);

    // 4. CAMADA REDEMET (Radar de Chuva oficial do Brasil - WMS)
    var radarBrasil = L.tileLayer.wms("https://redemet.decea.mil.br/geoserver/wms", {
        layers: 'conveccao:radar_max',
        format: 'image/png',
        transparent: true,
        opacity: 0.8,
        zIndex: 1000,
        attribution: "REDEMET"
    }).addTo(map);

    // 5. CARREGAR FAZENDAS (Com proteção para erros de dados)
    fetch('fazendas.json')
        .then(response => response.json())
        .then(data => {
            var camadaFazendas = L.geoJSON(data, {
                style: { color: "#39ff14", weight: 3, fillOpacity: 0.2 },
                onEachFeature: function (feature, layer) {
                    var n = (feature.properties && (feature.properties.nome || feature.properties.Name)) || "Área Rural";
                    layer.bindPopup("<b>" + n + "</b>");
                }
            }).addTo(map);
            
            map.fitBounds(camadaFazendas.getBounds());
            document.getElementById('status').innerText = "FAZENDAS CARREGADAS";
        })
        .catch(e => {
            document.getElementById('status').innerText = "ERRO NO ARQUIVO JSON";
            console.error("Erro no JSON:", e);
        });

    // Seletor de Camadas (No canto direito pra você testar qual aparece)
    var overlays = {
        "Nuvens (GOES-16 NASA)": nuvensNasa,
        "Chuva Real (Radar REDEMET)": radarBrasil
    };
    L.control.layers({}, overlays, {collapsed: false}).addTo(map);

</script>
</body>
</html>
