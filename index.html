<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Centro de Comando Rural - GitHub Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #001; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .control-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #00ff00;
            padding: 15px; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>

<div class="control-panel">
    <h3 style="margin:0">CONTROLE DE SAFRA</h3>
    <div id="status">Sincronizando sistemas...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Configurações Iniciais do Mapa
    const map = L.map('map').setView([-15, -55], 4);

    // 2. Mapas de Fundo (Base Layers)
    const googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Google' });
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    googleSat.addTo(map); // Satélite por padrão

    // 3. CAMADA NASA GOES-16 (Infravermelho - Nuvens)
    const nasaGoes = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_Band13/default/{time}/GoogleMapsCompatible_Level8/{z}/{y}/{x}.google', {
        time: '', opacity: 0.5, zIndex: 10
    });

    // 4. CAMADA RADAR GLOBAL (RainViewer)
    // Criamos um grupo de camadas para o radar
    const radarLayerGroup = L.layerGroup();
    
    async function updateRadar() {
        try {
            const resp = await fetch('https://api.rainviewer.com/public/weather-maps.json');
            const data = await resp.json();
            const ts = data.radar.past[data.radar.past.length - 1].time;
            
            radarLayerGroup.clearLayers();
            L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${ts}/256/{z}/{x}/{y}/2/1_1.png`, {
                opacity: 0.7, zIndex: 20
            }).addTo(radarLayerGroup);
            
            document.getElementById('status').innerText = "Radar & GOES-16: Operacionais";
        } catch (e) {
            document.getElementById('status').innerText = "Erro na sincronização do Radar";
        }
    }
    updateRadar();
    radarLayerGroup.addTo(map);

    // 5. CARREGAR SUAS FAZENDAS (Agora via Fetch real)
    fetch('fazendas.json')
        .then(response => response.json())
        .then(data => {
            const fazendasLayer = L.geoJSON(data, {
                style: { color: "#39ff14", weight: 3, fillOpacity: 0.2 },
                onEachFeature: (feature, layer) => {
                    layer.bindPopup(`<b>Fazenda:</b> ${feature.properties.nome || 'Área Registrada'}`);
                }
            }).addTo(map);
            map.fitBounds(fazendasLayer.getBounds());
        })
        .catch(err => console.error("Erro ao carregar fazendas.json:", err));

    // 6. SELETOR DE CAMADAS (A Mágica das Opções)
    const baseMaps = {
        "Visão Satélite": googleSat,
        "Visão Mapa": osm
    };

    const overlayMaps = {
        "Radar de Chuva": radarLayerGroup,
        "Nuvens GOES-16 (NASA)": nasaGoes
    };

    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

</script>
</body>
</html>
