<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radar Real-Time - Estável</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; }
        .painel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: #00ff00;
            padding: 10px; border-radius: 5px; font-family: monospace;
            border: 1px solid #00ff00; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="painel">
    > SISTEMA ONLINE (GITHUB PAGES)<br>
    > MODO: SEM SINCRONIZAÇÃO (FORÇA BRUTA)<br>
    > CAMADAS: GOES-16 + RADAR AGORA
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Mapa centrado no Brasil
    var map = L.map('map').setView([-15, -55], 4);

    // 2. Fundo Satélite (Google) - SEMPRE funciona
    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: 'Google'
    }).addTo(map);

    // 3. Camada de CHUVA (RainViewer - Link Estático "Nowcast")
    // Este link pega os dados mais recentes SEM precisar consultar API. 
    // O 'nowcast_10' é o código para os últimos 10 minutos.
    var camadaChuva = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast_10/256/{z}/{x}/{y}/2/1_1.png', {
        opacity: 0.7,
        zIndex: 1000
    }).addTo(map);

    // 4. Camada NASA GOES-16 (Nuvens em tempo real)
    var camadaNasa = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_Band13/default/{time}/GoogleMapsCompatible_Level8/{z}/{y}/{x}.google', {
        time: '',
        opacity: 0.4,
        zIndex: 500
    }).addTo(map);

    // 5. Carregar Fazendas (Verifique se o nome do arquivo no GitHub é exatamente fazendas.json)
    fetch('fazendas.json')
        .then(response => {
            if (!response.ok) throw new Error("Arquivo fazendas.json não encontrado no servidor.");
            return response.json();
        })
        .then(data => {
            var f = L.geoJSON(data, {
                style: { color: "#39ff14", weight: 2, fillOpacity: 0.2 }
            }).addTo(map);
            map.fitBounds(f.getBounds());
        })
        .catch(err => {
            console.error(err);
            alert("Erro ao carregar fazendas.json. Verifique se o arquivo está na raiz do GitHub.");
        });

    // 6. Seletor de Camadas (Canto Superior Direito)
    var overlays = {
        "Chuva (Radar)": camadaChuva,
        "Nuvens (GOES-16 NASA)": camadaNasa
    };
    L.control.layers({}, overlays, {collapsed: false}).addTo(map);

</script>
</body>
</html>
