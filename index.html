<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mapa de Fazendas - Anti-Firewall</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 100vh; width: 100%; background: #000; }</style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-15, -55], 4);
        
        // Fundo que o FortiGuard libera
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // SOBREPOSIÇÃO DA CHUVA (A imagem que o robô baixou)
        // Coordenadas aproximadas para cobrir o Brasil com a imagem do radar
        var limitesBrasil = [[5.2, -73.9], [-33.7, -32.3]];
        L.imageOverlay('radar.png', limitesBrasil, { opacity: 0.6 }).addTo(map);

        // CARREGAR FAZENDAS
        fetch('fazendas.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ff0000", weight: 2, fillOpacity: 0.2 }
                }).addTo(map);
            });
    </script>
</body>
</html>
