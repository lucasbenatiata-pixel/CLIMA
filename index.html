<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento Rural - Modo Home Office</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: #eee; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .aviso {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px;
            border: 1px solid #f1c40f; color: #f1c40f; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="aviso">
    <b>⚠️ BLOQUEIO DE REDE DETECTADO</b><br>
    O seu escritório bloqueia sites militares (.mil.br).<br>
    Tentando radar comercial via porta 443...
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Mapa centrado no Brasil
    var map = L.map('map').setView([-15, -55], 4);

    // 2. Usando OpenStreetMap (Mais chance de estar liberado que o Google Sat)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OSM'
    }).addTo(map);

    // 3. Radar de Chuva (RainViewer - Fonte Comercial .com)
    // Usando o link que pega o tempo real de forma "cega"
    var radarComercial = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast_5/256/{z}/{x}/{y}/2/1_1.png', {
        opacity: 0.7,
        zIndex: 1000
    }).addTo(map);

    // 4. Carregar Fazendas
    fetch('fazendas.json')
        .then(res => res.json())
        .then(data => {
            var f = L.geoJSON(data, {
                style: { color: "#2ecc71", weight: 3, fillOpacity: 0.2 }
            }).addTo(map);
            map.fitBounds(f.getBounds());
        })
        .catch(() => { console.log("Erro no JSON local"); });

</script>
</body>
</html>
